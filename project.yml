name: DiskLiberator
options:
  bundleIdPrefix: com.diskliberator
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic

targets:
  DiskLiberator:
    type: application
    platform: macOS
    sources:
      - path: Sources/DiskLiberator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.diskliberator.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: Sources/DiskLiberator/GeneratedInfo.plist
      properties:
        CFBundleName: DiskLiberator
        CFBundleDisplayName: DiskLiberator
        CFBundleIdentifier: com.diskliberator.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 DiskLiberator"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSSystemAdministrationUsageDescription: "DiskLiberator needs system access to clean caches and manage files."
        NSAppleEventsUsageDescription: "DiskLiberator needs automation access to manage startup items."
